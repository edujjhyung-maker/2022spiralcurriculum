<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>나선형 성취기준 지도</title>
<meta name="description" content="성취기준을 고르면 학년군 나선형 위계가 펼쳐지는 지도" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="title-block">
      <h1>
        <svg class="spiral-mark" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <path d="M20 4a16 16 0 1 0 16 16A13 13 0 1 1 20 8a10 10 0 1 0 10 12" stroke="#26324f" stroke-width="3" stroke-linecap="round"/>
          <circle cx="20" cy="20" r="2.6" fill="#d29426"/>
        </svg>
        나선형 성취기준 지도
      </h1>
      <p>성취기준을 고르면 같은 영역 안에서 <b>1~2 · 3~4 · 5~6학년군</b>으로 이어지는 나선형 위계가 펼쳐집니다.</p>
    </div>
    <span class="badge" id="badge"><span class="dot"></span></span>
  </header>

  <div class="tabs" id="tabs" role="tablist"></div>
  <div class="areachips" id="areachips"></div>

  <div class="controls">
    <label class="ctl-label" for="stdSelect">성취기준 선택</label>
    <div class="select-wrap">
      <select id="stdSelect" aria-label="성취기준 선택"></select>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5a6483" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </div>

  <main><div class="panel" id="stage"></div></main>

  <p class="foot">나선형 성취기준 지도 · 성취기준을 눌러 학년군 계열을 확인하세요.</p>
</div>

<script src="./data.js"></script>
<script src="./app.js"></script>
</body>
</html>
